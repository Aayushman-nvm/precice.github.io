<a href="{{ include.logo.link }}" class="carousel-item no-icon">
  <div class="carousel-logo-holder">
    <img src="images/logo/{{ include.logo.logo }}"
         alt="{{ include.logo.name }}">
  </div>
  <span class="carousel-name">{{ include.logo.name }}</span>
  <span class="carousel-country">{{ include.logo.country }}</span>
</a>
